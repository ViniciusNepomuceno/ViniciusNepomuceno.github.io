<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array de Sabores</title>
</head>
<body>
    <h1>Pizzaria Array de Sabores</h1>
    <h3>A primeira pizzaria do Brasil feita por programadores!</h3>
    <form id="pedidos">
        <fieldset>
            <legend>Nome completo</legend>
            <label for="nome">Nome:
                <input 
                    type="text"
                    id="nome"
                    placeholder="Informe seu nome completo"
                    required
                    >
            </label>
        </fieldset>
        <fieldset>
            <legend>Escolhe os ingredientes da sua pizza</legend>
            <label for="queijo">
                <input
                    type="checkbox"
                    id="queijo"
                    name="ingredientes"
                    value="queijo"
                >
                Queijo
            </label>
            <label for="calabresa">
            <input
                type="checkbox"
                id="calabresa"
                name="ingredientes"
                value="calabresa"
                >
                Calabresa
            </label>
            <label for="tomate">
                <input
                    type="checkbox"
                    id="tomate"
                    name="ingredientes"
                    value="tomate"
                >
                Tomate
            </label>
            <label for="cebola">
                <input
                    type="checkbox"
                    id="cebola"
                    name="ingredientes"
                    value="cebola"
                >
                Cebola
            </label>
            <br>
        </fieldset>
        <fieldset>
            <legend>Escolha o tamanho da sua pizza</legend>
            <label for="pequena">
                <input
                    type="checkbox"
                    id="pequena"
                    name="tamanho"
                    value="pequena"
                >
                Pequena (4 fatias)
            </label>
            <label for="media">
                <input
                    type="checkbox"
                    id="media"
                    name="tamanho"
                    value="media"
                >
                Média (6 fatias)
            </label>
            <label for="grande">
                <input
                    type="checkbox"
                    id="grande"
                    name="tamanho"
                    value="grande"
                >
                Grande (8 fatias)
            </label>
            <label for="familia">
                <input
                    type="checkbox"
                    id="familia"
                    name="tamanho"
                    value="familia"
                >
                Família (12 fatias)
            </label>
        </fieldset>
        <fieldset>
            <legend>Escolha o tipo de massa</legend>
            <select name="massa" id="massa">
            <option value="">Selecione o tipo de massa</option>
            <option value="massafina">Massa Fina</option>
            <option value="massagrossa">Massa Grossa</option>
            </select>
        </fieldset>
        <fieldset>
            <legend>Endereço</legend>
            <label for="endereco">Endereço:
                <input
                    type="text"
                    id="endereco"
                    placeholder="Informe o endereço de entrega"
                    required
                >        
        </fieldset>

        <label>
            <button type="submit">Enviar</button>
            <button type="reset">Limpar</button>
        </label>
    </form>

    <div id="resultado"></div>

<style>
body {
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    background-color: green;
}
fieldset {
    margin-bottom: 20px;
    color: white;
}
label {
    display: block;
    margin-bottom: 10px;
    color: white;
}
button {
    margin-right: 10px;
}
h1 {
    color: white;
}
h3 {
    color: white;
}
#resultado {
    margin-top: 20px;
    background-color: red;
    color: white;
    border: darkred 2px;
}
</style>
</body>
<script>
    document.getElementById('pedidos').addEventListener('submit', function(event) {
    event.preventDefault();
    const nome = document.getElementById('nome').value;
    const ingredientes = Array.from(document.querySelectorAll('input[name="ingredientes"]:checked')).map(input => input.value);
    const tamanho = Array.from(document.querySelectorAll('input[name="tamanho"]:checked')).map(input => input.value);
    const massa = document.getElementById('massa').value;
    const endereco = document.getElementById('endereco').value;

    const resultado = document.getElementById('resultado');
    resultado.innerHTML = `
        <h2>Obrigado por comprar pela Array de Sabores! Nos já recebemos o pedido e você receberá sua pizza no dia 30 de fevereiro.</h2>
        <p><strong>Nome:</strong> ${nome}</p>
        <p><strong>Ingredientes:</strong> ${ingredientes.join(', ')}</p>
        <p><strong>Tamanho:</strong> ${tamanho.join(', ')}</p>
        <p><strong>Massa:</strong> ${massa}</p>
        <p><strong>Endereço de Entrega:</strong> ${endereco}</p>
    `;
});
</script>
</html>
