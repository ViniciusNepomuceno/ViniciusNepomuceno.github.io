<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Título da páginas</title>
    <script>
        let nome = prompt("Digite seu nome: ");
        let numeroPuro = prompt("Digite seu número: ");
        let numeroConvertido = parseInt(prompt("Digite um número para ser convertido: "))

        //Concatenação de strings
        console.log("Nome: " + nome);
        console.log("1º Número: " + numeroPuro + " - Tipo desse número: " + typeof numeroPuro)
        console.log("2º Número: " + numeroConvertido + " - Tipo desse número: " + typeof numeroConvertido)

        //Interpolação
        console.log(`Meu nome é ${nome}\n 1º Número: ${numeroPuro} e o tipo dele é ${typeof numeroPuro}\n 2º Número: ${numeroConvertido} e o tipo dele é ${typeof numeroConvertido}`) 

    </script>
</head>
<body>
    
</body>
</html>
