<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form id="fomulario">
        <fieldset>
            <legend>Cadastro simples</legend>

            <label for="nome"> Nome:
                <input
                    type="text"
                    id="nome"
                    name="nome"
                    class="campoForm"
                    placeholder="Nome completo"
                    minlength="5"
                    maxlength="200"
                    autofocus
                    required
                >
            </label>

            <label for ="idade"> Idade:
                <input
                    type="number"
                    id="idade"
                    name="idade"
                    class="campoForm"
                    placeholder="Idade"
                    min="0"
                    max="150"
                    required
                >
            </label>
            <div class="botoes_form">
                <button type="submit">Enviar</button>
                <button type="reset">Limpar</button>
            </div>
        </fieldset>
    </form>
    <script src="script_atv.js"></script>
</body>
</html>
